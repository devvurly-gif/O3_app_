# =============================================================
# O3 App — Nginx Configuration for o3app.ma
# =============================================================
# DNS: *.o3app.ma → 161.35.19.66 (wildcard A record on Genious)
#
# Architecture:
#   o3app.ma              → Laravel central (landing + admin)
#   *.o3app.ma            → Laravel tenant  (ERP per client)
#   shop.*.o3app.ma       → O3_ecom SPA    (Vue storefront)
#
# SSL: Let's Encrypt wildcard cert (*.o3app.ma + o3app.ma)
# =============================================================

# -----------------------------------------------
# Redirect HTTP → HTTPS (all domains)
# -----------------------------------------------
server {
    listen 80;
    server_name o3app.ma *.o3app.ma;
    return 301 https://$host$request_uri;
}

# -----------------------------------------------
# 1) shop.*.o3app.ma → O3_ecom (Vue SPA)
# -----------------------------------------------
server {
    listen 443 ssl http2;
    server_name ~^shop\.(?<tenant>.+)\.o3app\.ma$;

    ssl_certificate     /etc/letsencrypt/live/o3app.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/o3app.ma/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/O3_ecom/dist;
    index index.html;

    # Serve tenant product images via the tenant ERP backend
    # shop.X.o3app.ma/storage/... → proxy to X.o3app.ma/storage/...
    location /storage/ {
        proxy_pass https://$tenant.o3app.ma;
        proxy_set_header Host $tenant.o3app.ma;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
    }
}

# -----------------------------------------------
# 2) o3app.ma + *.o3app.ma → Laravel (Central + Tenant)
# -----------------------------------------------
server {
    listen 443 ssl http2;
    server_name o3app.ma *.o3app.ma;

    ssl_certificate     /etc/letsencrypt/live/o3app.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/o3app.ma/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/O3_app/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny dotfiles (allow .well-known for ACME)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
