# O3 App — Nginx (o3app.ma)
# 3 server blocks: shop SPA + Laravel app + Reverb WebSocket
# SSL: run deployment/nginx/enable-ssl.sh after certbot

# ── Upstream for Reverb WebSocket server ──
upstream reverb {
    server 127.0.0.1:8080;
}

# ── 1) shop.*.o3app.ma → Vue SPA (O3_ecom) ──
server {
    listen 80;
    server_name ~^shop\.(?<tenant>.+)\.o3app\.ma$;

    root /var/www/O3_ecom/dist;
    index index.html;

    location /storage/ {
        proxy_pass http://$tenant.o3app.ma;
        proxy_set_header Host $tenant.o3app.ma;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. { deny all; }
}

# ── 2) o3app.ma + *.o3app.ma → Laravel ──
# IMPORTANT: Use regex (not wildcard) so shop regex block above takes priority.
# Nginx gives wildcards higher priority than regexes, but among regexes
# the first match wins — so shop block (listed first) catches shop.* domains.
server {
    listen 80;
    server_name o3app.ma ~^(?!shop\.)([a-z0-9-]+\.)?o3app\.ma$;

    root /var/www/O3_app/public;
    index index.php;
    charset utf-8;
    client_max_body_size 20M;

    # ── WebSocket proxy for Laravel Reverb ──
    location /app {
        proxy_pass             http://reverb;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;
    }

    # ── Broadcasting auth endpoint ──
    location /broadcasting/auth {
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known) { deny all; }
}
