# =============================================================
# O3 App — Nginx Configuration for o3app.ma
# =============================================================
# DNS: *.o3app.ma → 161.35.19.66 (wildcard A record)
#
# Routing:
#   o3app.ma              → Laravel (central app / landing)
#   *.o3app.ma            → Laravel (tenant ERP)
#   shop.*.o3app.ma       → O3_ecom SPA (Vue dist)
# =============================================================

# -----------------------------------------------
# 1) shop.*.o3app.ma → O3_ecom (Vue SPA)
# -----------------------------------------------
# MUST come BEFORE the wildcard block so Nginx matches it first.
server {
    listen 80;
    server_name ~^shop\.(?<tenant>.+)\.o3app\.ma$;

    root /var/www/O3_ecom/dist;
    index index.html;

    # SPA — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
    }
}

# -----------------------------------------------
# 2) o3app.ma + *.o3app.ma → Laravel (Central + Tenant)
# -----------------------------------------------
server {
    listen 80;
    server_name o3app.ma *.o3app.ma;

    root /var/www/O3_app/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
