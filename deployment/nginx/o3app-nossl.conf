# =============================================================
# O3 App — Nginx Configuration (HTTP only, no SSL)
# Use this temporarily before SSL is configured.
# Once SSL is ready, switch to o3app.conf
# =============================================================

# -----------------------------------------------
# 1) shop.*.o3app.ma → O3_ecom (Vue SPA)
# -----------------------------------------------
server {
    listen 80;
    server_name ~^shop\.(?<tenant>.+)\.o3app\.ma$;

    root /var/www/O3_ecom/dist;
    index index.html;

    # Proxy tenant storage to the ERP backend
    location /storage/ {
        proxy_pass http://$tenant.o3app.ma;
        proxy_set_header Host $tenant.o3app.ma;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. { deny all; }
}

# -----------------------------------------------
# 2) o3app.ma + *.o3app.ma → Laravel
# -----------------------------------------------
server {
    listen 80;
    server_name o3app.ma *.o3app.ma;

    root /var/www/O3_app/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known) { deny all; }
}
