name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: o3_app_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, bcmath, intl, gd, zip, exif
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare testing env
        run: |
          cp .env.testing .env
          php artisan key:generate --ansi

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root --silent; then
              echo "MySQL is up"; break
            fi
            sleep 1
          done

      - name: Run full test suite
        # Entire Unit + Feature suite must stay green. Triaged at 265 passing
        # (616 assertions) before flipping the gate. The previous scoped list
        # (5 files) is kept in git history at commit 88de45f if we ever need
        # to regress it while a flaky/broken test is being fixed.
        run: php artisan test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check (vue-tsc)
        # Cleaned up in commit 88de45f-follow-up (0 errors at activation).
        # Catches type drift in stores / components before it ships.
        run: npm run type-check

      - name: Build Vite bundle
        # Catches Vue template syntax errors, missing imports, and any
        # regression in `resources/js` that would break `npm run build`
        # on the VPS before we deploy.
        run: npm run build
